name: Auto Rollback
on:
  workflow_run:
    workflows: ["FORGEMIND CI Pipeline"]
    types: [completed]
jobs:
  rollback:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/rollback.js --reason="workflow failure"
