name: Weekly Cost Report
on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/cost-report.js --period=week
